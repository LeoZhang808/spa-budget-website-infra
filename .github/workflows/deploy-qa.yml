name: Deploy to QA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Source repo branch/tag/SHA to build from"
        required: false
        default: "main"
  schedule:
    - cron: '0 6 * * *'

env:
  SSH_OPTS: "-o StrictHostKeyChecking=no -i /tmp/ec2_key.pem"

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Step 0: Validate secrets ──────────────────────────────────────
      - name: Validate required secrets
        run: |
          MISSING=""
          for SECRET_NAME in \
            AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY \
            AWS_SESSION_TOKEN \
            AWS_REGION \
            AWS_ACCOUNT_ID \
            QA_EC2_HOST \
            EC2_SSH_KEY \
            EC2_SSH_USER \
            EC2_SECURITY_GROUP_ID \
            EC2_SUBNET_ID \
            EC2_AMI_ID \
            EC2_KEY_PAIR_NAME \
            SOURCE_REPO; do
            eval VALUE="\$$SECRET_NAME"
            if [ -z "$VALUE" ]; then
              MISSING="$MISSING $SECRET_NAME"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets are present."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          QA_EC2_HOST: ${{ secrets.QA_EC2_HOST }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_SSH_USER: ${{ secrets.EC2_SSH_USER }}
          EC2_SECURITY_GROUP_ID: ${{ secrets.EC2_SECURITY_GROUP_ID }}
          EC2_SUBNET_ID: ${{ secrets.EC2_SUBNET_ID }}
          EC2_AMI_ID: ${{ secrets.EC2_AMI_ID }}
          EC2_KEY_PAIR_NAME: ${{ secrets.EC2_KEY_PAIR_NAME }}
          SOURCE_REPO: ${{ secrets.SOURCE_REPO }}

      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

      - name: Launch temp EC2
        id: launch-ec2
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ${{ secrets.EC2_AMI_ID }} \
            --instance-type t2.small \
            --key-name ${{ secrets.EC2_KEY_PAIR_NAME }} \
            --security-group-ids ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --subnet-id ${{ secrets.EC2_SUBNET_ID }} \
            --user-data file://deploy/user-data.sh \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=budget-app-temp-verify}]' \
            --associate-public-ip-address \
            --query 'Instances[0].InstanceId' --output text)
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Instance launched: $INSTANCE_ID"

      # ── Step 5: Wait for instance running + get IP ───────────────────
      - name: Wait for instance running and get IP
        id: get-ip
        run: |
          INSTANCE_ID="${{ steps.launch-ec2.outputs.INSTANCE_ID }}"
          echo "Waiting for instance $INSTANCE_ID to be running..."
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          TEMP_EC2_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "TEMP_EC2_IP=$TEMP_EC2_IP" >> "$GITHUB_OUTPUT"
          echo "Instance running at: $TEMP_EC2_IP"

      # ── Step 6: Wait for SSH + user-data complete + Docker ready ───────
      - name: Wait for SSH and Docker ready
        run: |
          TEMP_EC2_IP="${{ steps.get-ip.outputs.TEMP_EC2_IP }}"
          echo "Waiting for SSH + user-data + Docker Compose on $TEMP_EC2_IP..."
          for i in $(seq 1 40); do
            if ssh ${{ env.SSH_OPTS }} ${{ secrets.EC2_SSH_USER }}@"$TEMP_EC2_IP" \
              "test -f /tmp/user-data-complete && docker compose version" 2>/dev/null; then
              echo "SSH and Docker Compose ready after attempt $i"
              exit 0
            fi
            echo "Attempt $i/40 — retrying in 15s..."
            sleep 15
          done
          echo "::error::Timed out waiting for SSH + Docker Compose on temp EC2"
          exit 1

      - name: Clone source repo on temp EC2
        run: |
          TEMP_EC2_IP="${{ steps.get-ip.outputs.TEMP_EC2_IP }}"
          SOURCE_REF="${{ github.event.inputs.source_ref || 'main' }}"
          echo "Cloning source repo (ref: $SOURCE_REF) on $TEMP_EC2_IP..."
          ssh ${{ env.SSH_OPTS }} ${{ secrets.EC2_SSH_USER }}@"$TEMP_EC2_IP" \
            "git clone https://github.com/${{ secrets.SOURCE_REPO }}.git app && cd app && git checkout $SOURCE_REF"

      - name: Build and start app on temp EC2
        run: |
          TEMP_EC2_IP="${{ steps.get-ip.outputs.TEMP_EC2_IP }}"
          echo "Building and starting app on $TEMP_EC2_IP..."
          ssh ${{ env.SSH_OPTS }} ${{ secrets.EC2_SSH_USER }}@"$TEMP_EC2_IP" \
            "cd app && docker compose up -d --build"

      - name: Wait for app startup
        run: |
          TEMP_EC2_IP="${{ steps.get-ip.outputs.TEMP_EC2_IP }}"
          echo "Waiting for containers to be ready..."
          for i in $(seq 1 12); do
            RUNNING=$(ssh ${{ env.SSH_OPTS }} ${{ secrets.EC2_SSH_USER }}@"$TEMP_EC2_IP" \
              "cd app && docker compose ps --format json" 2>/dev/null | grep -c '"running"' || true)
            echo "Attempt $i/12 — $RUNNING container(s) running"
            if [ "$RUNNING" -ge 2 ]; then
              echo "App containers are up."
              exit 0
            fi
            sleep 10
          done
          ssh ${{ env.SSH_OPTS }} ${{ secrets.EC2_SSH_USER }}@"$TEMP_EC2_IP" \
            "cd app && docker compose ps && docker compose logs --tail=50"
          echo "::error::Containers did not reach running state in time"
          exit 1

      - name: Smoke test temp EC2
        run: |
          TEMP_EC2_IP="${{ steps.get-ip.outputs.TEMP_EC2_IP }}"
          chmod +x deploy/smoke-test.sh
          ./deploy/smoke-test.sh "http://$TEMP_EC2_IP:5173"

      # ── Step 11: Get source commit SHA for image tag ────────────────────
      - name: Get image tag from source
        id: image-tag
        run: |
          TEMP_EC2_IP="${{ steps.get-ip.outputs.TEMP_EC2_IP }}"
          IMAGE_TAG=$(ssh ${{ env.SSH_OPTS }} ${{ secrets.EC2_SSH_USER }}@"$TEMP_EC2_IP" \
            "cd app && git rev-parse --short=7 HEAD")
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $IMAGE_TAG"

      # ── Step 12: Tag images for ECR on temp EC2 ──────────────────────────
      - name: Tag images for ECR
        run: |
          TEMP_EC2_IP="${{ steps.get-ip.outputs.TEMP_EC2_IP }}"
          IMAGE_TAG="${{ steps.image-tag.outputs.IMAGE_TAG }}"
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          ssh ${{ env.SSH_OPTS }} ${{ secrets.EC2_SSH_USER }}@"$TEMP_EC2_IP" \
            "ECR_REGISTRY='$ECR_REGISTRY' IMAGE_TAG='$IMAGE_TAG' && \
            docker tag app-frontend:latest \$ECR_REGISTRY/budget-app-frontend:\$IMAGE_TAG && \
            docker tag app-frontend:latest \$ECR_REGISTRY/budget-app-frontend:latest && \
            docker tag app-backend:latest \$ECR_REGISTRY/budget-app-backend:\$IMAGE_TAG && \
            docker tag app-backend:latest \$ECR_REGISTRY/budget-app-backend:latest"

      # ── Step 13: ECR login on temp EC2 ───────────────────────────────────
      - name: ECR login on temp EC2
        run: |
          TEMP_EC2_IP="${{ steps.get-ip.outputs.TEMP_EC2_IP }}"
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          ssh ${{ env.SSH_OPTS }} ${{ secrets.EC2_SSH_USER }}@"$TEMP_EC2_IP" \
            "export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
             AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
             AWS_SESSION_TOKEN='${{ secrets.AWS_SESSION_TOKEN }}' \
             AWS_REGION='${{ secrets.AWS_REGION }}' && \
             aws ecr get-login-password --region \$AWS_REGION | \
             docker login --username AWS --password-stdin $ECR_REGISTRY"

      # ── Step 14: Push images to ECR from temp EC2 ────────────────────────
      - name: Push images to ECR
        run: |
          TEMP_EC2_IP="${{ steps.get-ip.outputs.TEMP_EC2_IP }}"
          IMAGE_TAG="${{ steps.image-tag.outputs.IMAGE_TAG }}"
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          ssh ${{ env.SSH_OPTS }} ${{ secrets.EC2_SSH_USER }}@"$TEMP_EC2_IP" \
            "docker push $ECR_REGISTRY/budget-app-frontend:$IMAGE_TAG && \
             docker push $ECR_REGISTRY/budget-app-frontend:latest && \
             docker push $ECR_REGISTRY/budget-app-backend:$IMAGE_TAG && \
             docker push $ECR_REGISTRY/budget-app-backend:latest"

      # ── Step 15: SCP deploy files to QA EC2 ────────────────────────────────
      - name: SCP deploy files to QA EC2
        run: |
          scp ${{ env.SSH_OPTS }} -r deploy/ ${{ secrets.EC2_SSH_USER }}@${{ secrets.QA_EC2_HOST }}:/tmp/

      # ── Step 16: Deploy to QA EC2 ────────────────────────────────────────
      - name: Deploy to QA EC2
        run: |
          IMAGE_TAG="${{ steps.image-tag.outputs.IMAGE_TAG }}"
          ssh ${{ env.SSH_OPTS }} ${{ secrets.EC2_SSH_USER }}@${{ secrets.QA_EC2_HOST }} "
            export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
                   AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
                   AWS_SESSION_TOKEN='${{ secrets.AWS_SESSION_TOKEN }}' \
                   AWS_REGION='${{ secrets.AWS_REGION }}' \
                   AWS_ACCOUNT_ID='${{ secrets.AWS_ACCOUNT_ID }}' \
                   IMAGE_TAG='$IMAGE_TAG' && \
            cd /tmp/deploy && chmod +x deploy-qa.sh && ./deploy-qa.sh
          "

      # ── Step 17: Wait for QA startup ──────────────────────────────────────
      - name: Wait for QA startup
        run: sleep 30

      # ── Step 18: Smoke test QA EC2 ───────────────────────────────────────
      - name: Smoke test QA EC2
        run: |
          ./deploy/smoke-test.sh "http://${{ secrets.QA_EC2_HOST }}"

      - name: Terminate temp EC2
        if: always()
        run: |
          INSTANCE_ID="${{ steps.launch-ec2.outputs.INSTANCE_ID }}"
          if [ -n "$INSTANCE_ID" ]; then
            echo "Terminating instance $INSTANCE_ID..."
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID"
            echo "Terminate request sent."
          else
            echo "No instance to terminate."
          fi
