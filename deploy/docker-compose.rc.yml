# RC runtime: ECR images with RC tag (e.g. 1.0.0-rc1)
# ECR_REGISTRY and IMAGE_TAG are exported by deploy-rc.sh before running

services:
  frontend:
    image: ${ECR_REGISTRY}/budget-app-frontend:${IMAGE_TAG}
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    image: ${ECR_REGISTRY}/budget-app-backend:${IMAGE_TAG}
    env_file:
      - /opt/app/.env
    ports:
      - "4000:4000"
