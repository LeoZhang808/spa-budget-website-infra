# Nginx config for myapp-rc.domain.com (RC environment)
# Replace 'domain.com' with your actual domain.
# One-time setup: copy to /etc/nginx/conf.d/ on RC EC2, then run certbot.
#
# 1. Copy: sudo cp myapp-rc.domain.com.conf /etc/nginx/conf.d/
# 2. Edit: sudo sed -i 's/domain.com/YOUR_DOMAIN/g' /etc/nginx/conf.d/myapp-rc.domain.com.conf
# 3. Test: sudo nginx -t
# 4. Reload: sudo systemctl reload nginx
# 5. SSL: sudo certbot --nginx -d myapp-rc.YOUR_DOMAIN

server {
    listen 80;
    server_name myapp-rc.domain.com;

    # Frontend (SPA)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# SSL block — certbot adds this automatically when you run:
#   sudo certbot --nginx -d myapp-rc.YOUR_DOMAIN
#
# After certbot, you'll have something like:
#
# server {
#     listen 443 ssl;
#     server_name myapp-rc.YOUR_DOMAIN;
#     ssl_certificate /etc/letsencrypt/live/myapp-rc.YOUR_DOMAIN/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/myapp-rc.YOUR_DOMAIN/privkey.pem;
#     include /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
#
#     location / { ... }
#     location /api/ { ... }
# }
