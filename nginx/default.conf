# Host-level Nginx reverse proxy for QA EC2
# One-time manual setup: copy to /etc/nginx/sites-available/default and reload nginx
# Proxies port 80 to frontend container on 5173 (frontend proxies /api/ to backend)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name spa-budget.org www.spa-budget.org;  

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
